<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} - {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
</head>
<body>
  {% include header.html %}

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <script>
  (function() {
    /* Dropdown navigation */
    document.querySelectorAll('.nav-dropdown-toggle').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var parent = btn.closest('.nav-dropdown');
        var isOpen = parent.classList.contains('open');
        document.querySelectorAll('.nav-dropdown.open').forEach(function(d) {
          d.classList.remove('open');
        });
        if (!isOpen) parent.classList.add('open');
      });
    });
    document.addEventListener('click', function() {
      document.querySelectorAll('.nav-dropdown.open').forEach(function(d) {
        d.classList.remove('open');
      });
    });

    /* Team table icon replacement */
    var linkedinSvg = '<svg class="leader-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">' +
      '<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zM6.846 20.452H3.823V9h3.023v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>';
    var emailSvg = '<svg class="leader-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>';
    document.querySelectorAll('.team-matrix a').forEach(function(a) {
      if (a.href.indexOf('linkedin.com') !== -1) {
        a.innerHTML = linkedinSvg;
        a.title = 'LinkedIn';
        a.setAttribute('aria-label', 'LinkedIn');
      } else if (a.href.indexOf('mailto:') !== -1) {
        a.innerHTML = emailSvg;
        a.title = 'Email';
        a.setAttribute('aria-label', 'Email');
      }
    });
  })();
  </script>
</body>
</html>
