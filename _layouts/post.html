---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %}<span class="post-author">{% if page.author.email %}<a href="mailto:{{ page.author.email }}">{{ page.author.name | escape }}</a>{% else %}{{ page.author.name | default: page.author | escape }}{% endif %}</span>{% endif %}
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
